<!DOCTYPE html>
<html>
<head>

<title>VEX IQ Serial Bridge</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

</button>

<script type="module" src="app.js"></script>
